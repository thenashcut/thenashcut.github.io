<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nash | The Nash Cut</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at center, #2a2a2a 0%, #111 55%, #050505 100%);
      color: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 24px;
    }

    .content {
      max-width: 720px;
      width: 100%;
      padding: 48px 28px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      background: rgba(0, 0, 0, 0.28);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(4rem, 14vw, 8.5rem);
      line-height: 0.9;
      letter-spacing: -0.08em;
      font-weight: 800;
      text-transform: lowercase;
    }

    p {
      margin: 12px 0;
      font-size: clamp(1rem, 2.8vw, 1.35rem);
      line-height: 1.45;
      color: rgba(255, 255, 255, 0.88);
    }

    .tagline {
      color: #ffffff;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    a {
      color: #ffffff;
      text-decoration: underline;
      text-underline-offset: 5px;
      transition: opacity 0.2s ease;
    }

    a:hover {
      opacity: 0.72;
    }

    .coming-soon {
      margin-top: 24px;
      font-size: 0.95rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.58);
    }
  </style>
</head>
<body>
  <main class="content">
    <h1>nash</h1>
    <p class="tagline">vinyl jockey | Charlotte, NC</p>
    <p>playing bars, parties, and private events.</p>
    <p><a href="mailto:booking@thenashcut.com">booking@thenashcut.com</a></p>
    <p><a href="https://www.instagram.com/thenashcut" target="_blank" rel="noopener noreferrer" title="https://www.instagram.com/thenashcut">@thenashcut</a></p>
    <p class="coming-soon">website coming soon</p>
  </main>
</body>
</html>
